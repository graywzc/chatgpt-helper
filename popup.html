<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatGPT Navigator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 220px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    h1 {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #cba6f7;
    }
    p {
      font-size: 12px;
      color: #a6adc8;
      line-height: 1.5;
    }
    .tip {
      margin-top: 12px;
      padding: 10px;
      background: #313244;
      border-radius: 8px;
      font-size: 12px;
      color: #bac2de;
      line-height: 1.5;
    }
    .tip strong {
      color: #cdd6f4;
    }
  </style>
</head>
<body>
  <h1>ChatGPT Navigator</h1>
  <p>Adds a sidebar to ChatGPT listing all your messages for quick navigation.</p>
  <div class="tip">
    <strong>How to use:</strong><br/>
    Open any ChatGPT conversation and click the <strong>list icon</strong> button in the bottom-right corner to toggle the sidebar.
  </div>
</body>
</html>
